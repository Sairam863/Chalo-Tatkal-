<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chalo Tatkal - Fast Tatkal Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
  <style>
    body { background: linear-gradient(135deg, #0f5132 0%, #1a5f3a 100%); color: white; font-family: 'Segoe UI', sans-serif; }
    .dark-green { background: #0f5132; } .green { background: #198754; }
    .slide { height: 400px; } .slide img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Auto Slider -->
  <div class="slider-container mb-8" id="slider">
    <div class="slick-slider">
      <div><img src="https://images.unsplash.com/photo-1578623168246-7c5467c2e11a?w=1200" alt="Train 1" class="slide"></div>
      <div><img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=1200" alt="Train 2" class="slide"></div>
      <div><img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200" alt="Train 3" class="slide"></div>
    </div>
  </div>

  <!-- Login Modal (Simple) -->
  <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 p-8 rounded-xl max-w-md w-full mx-4">
      <h2 class="text-2xl font-bold mb-6 text-green-300">Login / Register</h2>
      <input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 bg-gray-800 rounded-lg">
      <input id="pass" type="password" placeholder="Password" class="w-full p-3 mb-6 bg-gray-800 rounded-lg">
      <button onclick="login()" class="w-full bg-green py-3 rounded-lg font-bold mb-2">Login</button>
      <button onclick="register()" class="w-full bg-dark-green py-3 rounded-lg font-bold">Register</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-4xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-2 text-green-300 text-center">🚂 Chalo Tatkal</h1>
    <p class="text-xl text-center mb-12 opacity-90">Fast Tatkal Train Booking - Real Time Seats</p>

    <!-- Search Form -->
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl mb-12">
      <h2 class="text-2xl font-bold mb-8 text-center">Search Tatkal Trains</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <input id="from" type="text" placeholder="From (e.g. HYB)" class="p-4 bg-gray-800 rounded-xl text-lg focus:outline-none focus:ring-4 ring-green">
        <input id="to" type="text" placeholder="To (e.g. NDLS)" class="p-4 bg-gray-800 rounded-xl text-lg focus:outline-none focus:ring-4 ring-green">
        <input id="date" type="date" class="p-4 bg-gray-800 rounded-xl text-lg focus:outline-none focus:ring-4 ring-green">
      </div>
      <button onclick="searchTrains()" class="w-full bg-gradient-to-r from-green to-dark-green py-4 rounded-xl text-xl font-bold hover:scale-105 transition-all shadow-xl">🔍 Search Trains</button>
    </div>

    <!-- Results -->
    <div id="results" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    // Mock Trains Data (Real API mock)
    const mockTrains = [
      { id: 1, name: 'Rajdhani Express (HYB-NDLS)', dep: '10:00 AM', arr: '06:00 PM', seats: 12, fare: 1850, from: 'HYB', to: 'NDLS' },
      { id: 2, name: 'Konark Express (SC-PURI)', dep: '02:30 PM', arr: '11:45 PM', seats: 8, fare: 950, from: 'SC', to: 'PURI' },
      { id: 3, name: 'Godavari Express (SC-VSKP)', dep: '05:15 PM', arr: '09:30 PM', seats: 15, fare: 650, from: 'SC', to: 'VSKP' },
      { id: 4, name: 'Falaknuma Express (HYB-NZM)', dep: '04:05 PM', arr: '09:20 AM', seats: 5, fare: 1650, from: 'HYB', to: 'NZM' }
    ];

    let loggedIn = false;
    let currentUser = null;

    // Simple Login (LocalStorage)
    function login() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      if (email && pass) {
        localStorage.setItem('user', JSON.stringify({ email }));
        currentUser = email;
        loggedIn = true;
        document.getElementById('loginModal').classList.add('hidden');
        alert('Login Success! Welcome ' + email);
      }
    }
    function register() {
      login(); // Same for demo
    }

    // Search
    function searchTrains() {
      const from = document.getElementById('from').value.toUpperCase();
      const to = document.getElementById('to').value.toUpperCase();
      const date = document.getElementById('date').value;
      if (!loggedIn) { document.getElementById('loginModal').classList.remove('hidden'); return; }
      if (!from || !to || !date) { alert('Fill all fields!'); return; }

      const filtered = mockTrains.filter(t => t.from.includes(from) && t.to.includes(to));
      let html = '';
      filtered.forEach(t => {
        html += `
          <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl hover:scale-105 transition-all cursor-pointer" onclick="bookTrain(${t.id})">
            <h3 class="text-2xl font-bold mb-2">${t.name}</h3>
            <p class="text-lg mb-1">Dep: ${t.dep} | Arr: ${t.arr}</p>
            <p class="text-xl font-bold text-green-400 mb-4">Seats: ${t.seats} | ₹${t.fare}</p>
            <div class="bg-green text-dark-green px-4 py-2 rounded-lg font-bold text-center">Book Tatkal</div>
          </div>
        `;
      });
      document.getElementById('results').innerHTML = html || '<p class="col-span-full text-center text-xl py-12 opacity-70">No Tatkal trains found. Try different stations.</p>';
    }

    // Booking (Demo)
    function bookTrain(id) {
      alert(`🎉 Tatkal Booked! Train ID: ${id}\nPayment Success (Demo)\nPayment ID: TXN${Date.now()}\nShow to recruiter!`);
    }

    // Auto Slider Init
    document.addEventListener('DOMContentLoaded', () => {
      $('.slider-container').slick({
        dots: true, infinite: true, speed: 500, slidesToShow: 1, autoplay: true, autoplaySpeed: 4000, arrows: false
      });
    });
  </script>
</body>
</html>
